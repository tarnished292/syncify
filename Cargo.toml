[package]
name = "syncify"
version = "0.1.0"
edition = "2024"

[dependencies]
reqwest = { version = "0.13.4", features = ["json", "form"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
rspotify = { version = "0.16.1", default-features = false, features = ["client-reqwest", "reqwest-rustls-tls"] }
regex = "1"
anyhow = "1"
tokio = { version = "1.52.3", features = ["full"] }
scraper = "0.27.0"
